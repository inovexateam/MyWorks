name: Docstring Auto-Filler

on:
  push:
    branches: [main]
    paths: ['**.cs','**.java','**.ts','**.tsx']
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  docfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Scan and fill
        id: scan
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python tools/docstring-filler/docfill.py \
            --repo . --apply --limit 50 --min-confidence 0.6 \
            --report --report-path docstring-report.html \
            --json > docfill-output.json 2>&1 || true
          APPLIED=$(python -c "import json; d=json.load(open('docfill-output.json')); print(d.get('applied',0))" 2>/dev/null || echo 0)
          echo "applied=$APPLIED" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: docstring-report-${{ github.run_number }}
          path: docstring-report.html
          retention-days: 14

      - name: Open PR if docs were added
        if: steps.scan.outputs.applied > 0
        run: |
          git config user.email "bot@docfill"
          git config user.name "Docstring Bot"
          BRANCH="docstrings/auto-fill-$(date +%s)"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "docs: auto-fill missing docstrings [skip ci]"
          git push origin "$BRANCH"
          gh pr create \
            --title "docs: auto-fill ${{ steps.scan.outputs.applied }} missing docstrings" \
            --body "Auto-generated by Docstring Auto-Filler. Review each for accuracy." \
            --base main --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
