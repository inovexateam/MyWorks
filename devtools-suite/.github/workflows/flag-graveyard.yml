name: Feature Flag Graveyard Hunter

on:
  schedule:
    # Bi-weekly — flags accumulate slowly
    - cron: '0 9 * * 1'
  push:
    branches: [main]
    paths:
      - 'appsettings*.json'
      - 'application*.yml'
      - '**/*.env'
      - '**.cs'
      - '**.java'
      - '**.ts'
  workflow_dispatch:

jobs:
  flag-graveyard:
    name: Hunt dead feature flags
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Graveyard scan
        id: scan
        run: |
          python tools/flag-graveyard/flag_graveyard.py \
            --repo . \
            --json > graveyard-output.json 2>&1 || true

          python tools/flag-graveyard/flag_graveyard.py \
            --repo . \
            --plans \
            --report flag-graveyard-report.html 2>&1 || true

          TOTAL=$(python -c "
          import json
          try:
            d = json.load(open('graveyard-output.json'))
            print(d.get('graveyard_count', 0))
          except: print(0)")

          SIMPLE=$(python -c "
          import json
          try:
            d = json.load(open('graveyard-output.json'))
            print(sum(1 for f in d.get('flags',[]) if f.get('cleanup_complexity') == 'simple'))
          except: print(0)")

          LOC=$(python -c "
          import json
          try:
            d = json.load(open('graveyard-output.json'))
            print(d.get('dead_lines', 0))
          except: print(0)")

          echo "total=$TOTAL"   >> $GITHUB_OUTPUT
          echo "simple=$SIMPLE" >> $GITHUB_OUTPUT
          echo "loc=$LOC"       >> $GITHUB_OUTPUT

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: flag-graveyard-report-${{ github.run_number }}
          path: flag-graveyard-report.html
          retention-days: 30

      - name: Upload cleanup plans
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flag-cleanup-plans-${{ github.run_number }}
          path: flag-cleanup-plans/
          retention-days: 30

      - name: Create graveyard issue
        if: steps.scan.outputs.total > 0
        uses: actions/github-script@v7
        with:
          script: |
            const total  = '${{ steps.scan.outputs.total }}';
            const simple = '${{ steps.scan.outputs.simple }}';
            const loc    = '${{ steps.scan.outputs.loc }}';
            const date   = new Date().toISOString().slice(0,10);

            const fs = require('fs');
            let flags = [];
            try {
              const data = JSON.parse(fs.readFileSync('graveyard-output.json'));
              flags = data.flags || [];
            } catch(e) {}

            const flagTable = flags.slice(0,15).map(f =>
              `| \`${f.name}\` | ${f.state.replace('_',' ')} | ${f.cleanup_complexity} | ${f.git_age_days || '?'}d | ${f.usage_count} |`
            ).join('\n');

            const body = [
              `## Feature Flag Graveyard — ${date}`,
              '',
              `Found **${total}** dead feature flags, **${simple}** with simple automated cleanup.`,
              `Removing them would eliminate ~${loc} lines of dead code.`,
              '',
              '| Flag | State | Complexity | Age | Usages |',
              '|------|-------|------------|-----|--------|',
              flagTable,
              flags.length > 15 ? `\n*...and ${flags.length - 15} more*` : '',
              '',
              '### Next steps',
              '1. Review the HTML report (attached to this Actions run)',
              '2. For each **simple** flag: create a cleanup PR from the plans in the artifact',
              '3. Coordinate **medium/complex** cleanups with the team',
              '',
              '---',
              '*Generated by Feature Flag Graveyard Hunter*'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Flag Graveyard] ${total} dead flags · ${simple} simple cleanups — ${date}`,
              body,
              labels: ['feature-flags', 'tech-debt', 'cleanup'],
            });

      - name: Fail if too many graveyard flags (configurable)
        if: steps.scan.outputs.total >= 50
        run: |
          echo "::warning::Feature flag graveyard has ${{ steps.scan.outputs.total }} dead flags."
          echo "Consider scheduling a cleanup sprint."
