name: Assumption Miner

on:
  pull_request:
    branches: [main, develop, master]
  push:
    branches: [main]

jobs:
  scan-assumptions:
    name: Scan for assumption contradictions
    runs-on: ubuntu-latest
    permissions:
      contents: write        # to commit updated registry
      pull-requests: write   # to post PR comments

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # full history needed for git diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pathlib dataclasses

      - name: Run Assumption Miner scan
        id: scan
        run: |
          cd ${{ github.workspace }}
          python tools/assumption-miner/assume_miner.py scan . --pr ${{ github.base_ref }}
        continue-on-error: true   # don't fail yet — post comment first

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: assumption-report
          path: assumption-report.html

      - name: Post PR comment on contradictions
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const contradictions = JSON.parse(
              fs.readFileSync('.contradiction-output.json', 'utf8')
            );
            if (!contradictions.length) {
              console.log('No contradictions — skipping comment');
              return;
            }
            const body = [
              '## Assumption Miner — Contradictions Found\n',
              `Found **${contradictions.length}** assumption(s) contradicted by this PR.\n`,
              ...contradictions.map(c => `
### \`${c.assumption_file}:${c.assumption_line}\`
> **Existing assumption:** ${c.statement}

**Contradicted by change in \`${c.contradiction_file}:${c.contradiction_line}\`:**
\`\`\`
${c.snippet}
\`\`\`
---`),
              '\n*Generated by Assumption Miner · See full report in Actions artifacts.*'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Commit updated registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "Assumption Miner Bot"
          git config user.email "bot@assumption-miner"
          git add .assumptions.json
          git diff --staged --quiet || git commit -m "chore: update assumption registry [skip ci]"
          git push

      - name: Fail if contradictions found
        if: steps.scan.outcome == 'failure'
        run: |
          echo "PR contradicts existing assumptions. Review the comment above."
          exit 1
