name: Dead Code Analyzer

on:
  schedule:
    # Weekly — dead code grows slowly, daily is overkill
    - cron: '0 9 * * 1'
  push:
    branches: [main]
    paths:
      - '**.cs'
      - '**.java'
      - '**.ts'
      - '**.tsx'
  workflow_dispatch:
    inputs:
      confidence:
        description: 'Minimum confidence level'
        default: 'medium'
        type: choice
        options: [high, medium, low]

jobs:
  dead-code:
    name: Scan for dead code
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Dead Code scan
        id: scan
        run: |
          python tools/dead-code/dead_code.py \
            --repo . \
            --confidence ${{ inputs.confidence || 'medium' }} \
            --json > dead-code-output.json 2>&1 || true

          python tools/dead-code/dead_code.py \
            --repo . \
            --report dead-code-report.html 2>&1 || true

          DEAD=$(python -c "
          import json
          try:
            d = json.load(open('dead-code-output.json'))
            print(d.get('dead_count', 0))
          except: print(0)")

          HIGH=$(python -c "
          import json
          try:
            d = json.load(open('dead-code-output.json'))
            print(d.get('by_confidence',{}).get('high', 0))
          except: print(0)")

          LOC=$(python -c "
          import json
          try:
            d = json.load(open('dead-code-output.json'))
            print(d.get('lines_recoverable', 0))
          except: print(0)")

          echo "dead=$DEAD"     >> $GITHUB_OUTPUT
          echo "high=$HIGH"     >> $GITHUB_OUTPUT
          echo "loc=$LOC"       >> $GITHUB_OUTPUT

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dead-code-report-${{ github.run_number }}
          path: dead-code-report.html
          retention-days: 30

      - name: Upload JSON report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dead-code-json-${{ github.run_number }}
          path: dead-code-output.json
          retention-days: 30

      - name: Create tracking issue (weekly)
        if: |
          github.event_name == 'schedule' &&
          steps.scan.outputs.high > 0
        uses: actions/github-script@v7
        with:
          script: |
            const dead = '${{ steps.scan.outputs.dead }}';
            const high = '${{ steps.scan.outputs.high }}';
            const loc  = '${{ steps.scan.outputs.loc }}';
            const date = new Date().toISOString().slice(0,10);

            const body = [
              `## Weekly dead code report — ${date}`,
              '',
              `| Metric | Value |`,
              `|--------|-------|`,
              `| Total dead symbols | ${dead} |`,
              `| High confidence (safe to delete) | **${high}** |`,
              `| Recoverable LOC | ~${loc} |`,
              '',
              'The full interactive report is available in the Actions artifacts.',
              '',
              '### Next steps',
              '1. Review the HTML report',
              '2. Delete symbols marked **safe to delete**',
              '3. Investigate medium-confidence findings',
              '',
              '---',
              '*Generated by Dead Code Analyzer*'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Dead Code] ${high} symbols safe to delete — ${date}`,
              body,
              labels: ['dead-code', 'tech-debt'],
            });

      - name: Comment on PR if dead code increased (push to main)
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const high = parseInt('${{ steps.scan.outputs.high }}');
            if (high === 0) return;
            console.log(`Dead code check: ${high} high-confidence dead symbols found.`);
