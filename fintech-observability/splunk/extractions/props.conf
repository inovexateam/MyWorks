# =============================================================
# Splunk props.conf — Fintech Business Observability
# Deploy to: $SPLUNK_HOME/etc/apps/fintech_observability/local/
# =============================================================

[ocp_fintech_logs]
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
TIME_PREFIX = ^
MAX_TIMESTAMP_LOOKAHEAD = 28
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TRUNCATE = 10000

# Apply business field extractions
TRANSFORMS-business  = fintech_business_fields
TRANSFORMS-errors    = fintech_error_fields
TRANSFORMS-trace     = fintech_trace_fields

# Eval-based derived fields
EVAL-is_error        = if(status_code >= 400, 1, 0)
EVAL-is_success      = if(status_code == 200, 1, 0)
EVAL-amount_inr      = tonumber(amount)
EVAL-duration_sec    = tonumber(duration_ms) / 1000
EVAL-sla_breached    = if(tonumber(duration_ms) > 2000, 1, 0)
EVAL-revenue_at_risk = if(status_code >= 400, tonumber(amount), 0)

[source::.../logs/sample/payment-api.log]
sourcetype = ocp_fintech_logs

[source::.../logs/sample/ui-app.log]
sourcetype = ocp_fintech_logs
