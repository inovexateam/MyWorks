# =============================================================
# Splunk transforms.conf — Fintech Business Observability
# Deploy to: $SPLUNK_HOME/etc/apps/fintech_observability/local/
# =============================================================

[fintech_business_fields]
REGEX = app=(?P<app>\S+).*?(?:pod=(?P<pod>\S+))?.*?namespace=(?P<namespace>\S+).*?method=(?P<http_method>\S+).*?endpoint=(?P<endpoint>\S+).*?status=(?P<status_code>\d+).*?user_id=(?P<user_id>\S+).*?customer_tier=(?P<customer_tier>\S+).*?amount=(?P<amount>\d+).*?currency=(?P<currency>\S+).*?duration_ms=(?P<duration_ms>\d+).*?region=(?P<region>\S+).*?workflow_step=(?P<workflow_step>\S+).*?correlation_id=(?P<correlation_id>\S+)
SOURCE_KEY = _raw

[fintech_error_fields]
REGEX = error=(?P<error_type>\S+).*?error_code=(?P<error_code>\S+)
SOURCE_KEY = _raw

[fintech_trace_fields]
REGEX = trace_id=(?P<trace_id>\S+)
SOURCE_KEY = _raw

# Lookup: customer tier to revenue weight
[customer_tier_lookup]
filename = customer_tier.csv
