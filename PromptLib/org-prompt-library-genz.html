<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ prompt drip — the org's prompt stash</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  /* gen z palette — electric, candy, high-contrast */
  --bg-primary:#ffffff;
  --bg-page:#0e0a1f;
  --bg-page2:#1a1033;
  --bg-card:#15102b;
  --bg-card-hover:#1d1640;
  --bg-chip:#241c45;
  --text-primary:#f5f3ff;
  --text-secondary:#b8aee0;
  --text-tertiary:#7e74a8;
  --border-primary:#4b3d8a;
  --border-secondary:#352a63;
  --border-tertiary:#241c45;
  --grad-1:#ff5fa2; /* hot pink */
  --grad-2:#7c5cff; /* violet */
  --grad-3:#00e5c7; /* mint/teal */
  --grad-4:#ffd23f; /* sunshine */
  --grad-5:#5fc8ff; /* sky */
  --grad-6:#ff8a5c; /* peach */
  --radius-md:14px;
  --radius-lg:22px;
  --radius-pill:999px;
  --font-display:"Sora",sans-serif;
  --font-sans:"Space Grotesk",-apple-system,BlinkMacSystemFont,sans-serif;
  --font-mono:"JetBrains Mono","SF Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  font-family:var(--font-sans);
  color:var(--text-primary);
  background:
    radial-gradient(circle at 10% 0%, rgba(124,92,255,0.35), transparent 45%),
    radial-gradient(circle at 90% 10%, rgba(255,95,162,0.25), transparent 45%),
    radial-gradient(circle at 50% 100%, rgba(0,229,199,0.18), transparent 50%),
    var(--bg-page);
  min-height:100vh;
}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.page{max-width:1140px;margin:0 auto;padding:2.5rem 1.25rem 5rem}

.hero{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:1.75rem;flex-wrap:wrap}
.hero-title-wrap{display:flex;flex-direction:column;gap:6px}
.eyebrow{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--grad-3);font-weight:600;width:fit-content}
.eyebrow::before{content:"●";color:var(--grad-1);font-size:9px}
.top-bar h1{
  font-family:var(--font-display);
  font-size:clamp(28px,4vw,40px);
  font-weight:800;
  line-height:1.05;
  background:linear-gradient(95deg, var(--grad-1), var(--grad-2) 45%, var(--grad-5) 80%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  letter-spacing:-0.01em;
}
.top-bar h1 i{display:none}
.count-badge{
  font-family:var(--font-mono);
  font-size:11px;font-weight:600;
  padding:4px 11px;
  border-radius:var(--radius-pill);
  background:linear-gradient(95deg, var(--grad-1), var(--grad-2));
  color:#fff;
  margin-left:10px;
  vertical-align:middle;
  box-shadow:0 0 16px rgba(124,92,255,0.5);
}
.subtitle{font-size:14px;color:var(--text-secondary);margin-top:2px;font-weight:500}
.subtitle b{color:var(--grad-4);font-weight:600}

.search-wrap{
  display:flex;align-items:center;gap:10px;
  background:var(--bg-card);
  border:1.5px solid var(--border-secondary);
  border-radius:var(--radius-pill);
  padding:11px 18px;min-width:260px;
  transition:border-color .2s, box-shadow .2s;
}
.search-wrap:hover, .search-wrap:focus-within{
  border-color:var(--grad-2);
  box-shadow:0 0 0 3px rgba(124,92,255,0.18);
}
.search-wrap input{border:none;background:transparent;outline:none;font-size:14px;color:var(--text-primary);width:100%;font-family:var(--font-sans);font-weight:500}
.search-wrap input::placeholder{color:var(--text-tertiary)}
.search-wrap i{color:var(--grad-3);font-size:17px}

.role-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem}
.role-tab{
  font-family:var(--font-sans);
  font-size:13px;font-weight:600;
  padding:8px 16px;
  border:1.5px solid var(--border-secondary);
  border-radius:var(--radius-pill);
  cursor:pointer;
  background:var(--bg-card);
  color:var(--text-secondary);
  transition:all .18s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;
}
.role-tab:hover{border-color:var(--grad-3);color:var(--text-primary);transform:translateY(-2px)}
.role-tab.active{
  background:linear-gradient(95deg, var(--grad-1), var(--grad-2));
  color:#fff;border-color:transparent;
  box-shadow:0 4px 18px rgba(255,95,162,0.35);
  transform:translateY(-1px);
}
.role-tab.new-badge{position:relative}
.role-tab.new-badge::after{
  content:"NEW";font-family:var(--font-mono);
  font-size:8.5px;font-weight:700;
  background:var(--grad-4);color:#1a1033;
  border-radius:var(--radius-pill);padding:2px 6px;
  position:absolute;top:-9px;right:-8px;
  box-shadow:0 2px 6px rgba(255,210,63,0.5);
}

.note-banner{
  font-family:var(--font-mono);
  font-size:12px;line-height:1.6;
  color:var(--text-secondary);
  background:var(--bg-chip);
  border:1.5px dashed var(--grad-3);
  border-radius:var(--radius-md);
  padding:12px 16px;margin-bottom:18px;display:none;
}
.note-banner.show{display:block}
.note-banner::before{content:"💡 ";}

.prompt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.prompt-card{
  background:var(--bg-card);
  border:1.5px solid var(--border-tertiary);
  border-radius:var(--radius-lg);
  padding:1.2rem 1.3rem;
  cursor:pointer;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1), border-color .18s, box-shadow .18s;
  position:relative;
  overflow:hidden;
}
.prompt-card::before{
  content:"";position:absolute;inset:0;
  background:linear-gradient(135deg, rgba(124,92,255,0.08), rgba(255,95,162,0.05));
  opacity:0;transition:opacity .2s;pointer-events:none;
}
.prompt-card:hover{
  border-color:var(--grad-2);
  transform:translateY(-4px) scale(1.01);
  box-shadow:0 10px 30px rgba(124,92,255,0.25);
}
.prompt-card:hover::before{opacity:1}
.prompt-card.highlight{border-color:var(--grad-3);box-shadow:0 0 0 1px rgba(0,229,199,0.25)}
.card-header{display:flex;align-items:flex-start;gap:11px;margin-bottom:9px;position:relative;z-index:1}
.card-icon{
  width:38px;height:38px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:17px;
  box-shadow:inset 0 0 0 1.5px rgba(255,255,255,0.08);
}
.card-meta{flex:1;min-width:0}
.card-title{font-family:var(--font-display);font-size:15px;font-weight:700;line-height:1.3;margin-bottom:2px;color:var(--text-primary)}
.card-role{font-family:var(--font-mono);font-size:10.5px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.05em}
.card-desc{font-size:13px;color:var(--text-secondary);line-height:1.55;margin-bottom:12px;position:relative;z-index:1}
.card-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;position:relative;z-index:1}
.tag{
  font-family:var(--font-mono);
  font-size:10px;font-weight:600;
  padding:3px 10px;border-radius:var(--radius-pill);
  background:var(--bg-chip);color:var(--grad-5);
  border:1px solid var(--border-secondary);
}
.copy-btn{
  font-family:var(--font-sans);
  font-size:12.5px;font-weight:600;
  padding:6px 13px;
  border:1.5px solid var(--border-secondary);
  border-radius:var(--radius-pill);
  background:transparent;cursor:pointer;
  color:var(--text-secondary);
  display:flex;align-items:center;gap:5px;
  transition:all .15s;white-space:nowrap;
}
.copy-btn:hover{background:var(--grad-2);color:#fff;border-color:var(--grad-2)}
.copy-btn.copied{color:var(--bg-page);background:var(--grad-3);border-color:var(--grad-3)}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(10,6,24,0.75);backdrop-filter:blur(4px);z-index:100;align-items:flex-start;justify-content:center;padding-top:5vh;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{
  background:var(--bg-card);
  border:1.5px solid var(--border-primary);
  border-radius:var(--radius-lg);
  width:min(640px,92vw);max-height:84vh;overflow-y:auto;
  padding:1.7rem;
  box-shadow:0 20px 60px rgba(124,92,255,0.35), 0 0 0 1px rgba(255,255,255,0.05) inset;
}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:1.1rem}
.modal-title{font-family:var(--font-display);font-size:19px;font-weight:700;color:var(--text-primary)}
.modal-close{background:var(--bg-chip);border:none;cursor:pointer;color:var(--text-secondary);font-size:18px;line-height:1;padding:6px 11px;border-radius:var(--radius-pill);transition:all .15s}
.modal-close:hover{color:#fff;background:var(--grad-1)}
.prompt-box{
  background:#0a0717;
  border:1.5px solid var(--border-secondary);
  border-radius:var(--radius-md);
  padding:1.2rem;font-size:13px;line-height:1.75;
  white-space:pre-wrap;font-family:var(--font-mono);
  color:var(--grad-3);margin-bottom:1.2rem;overflow-x:auto;
}
.modal-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.1rem}
.modal-actions{display:flex;gap:10px}
.modal-actions button{
  font-family:var(--font-sans);
  font-size:14px;font-weight:700;
  padding:10px 22px;
  border:1.5px solid var(--border-secondary);
  border-radius:var(--radius-pill);
  background:transparent;cursor:pointer;
  color:var(--text-secondary);
  display:flex;align-items:center;gap:7px;
  transition:all .18s;
}
.modal-actions button:hover{background:var(--bg-chip);color:var(--text-primary)}
.modal-actions .primary-btn{
  background:linear-gradient(95deg, var(--grad-1), var(--grad-2));
  color:#fff;border-color:transparent;
  box-shadow:0 4px 16px rgba(255,95,162,0.35);
}
.modal-actions .primary-btn:hover{opacity:.9;color:#fff;transform:translateY(-1px)}

.empty{text-align:center;padding:3.5rem;color:var(--text-tertiary);font-size:15px;font-family:var(--font-display);font-weight:600}
.footer-note{text-align:center;font-size:12.5px;color:var(--text-tertiary);margin-top:3rem;font-family:var(--font-mono)}
.footer-note span{color:var(--grad-4)}
</style>
</head>
<body>

<h1 class="sr-only">Org Prompt Library — token-optimized prompts by role, SDLC phase, project iteration mode, and GitHub Copilot</h1>

<div class="page">
  <div class="top-bar">
    <div>
      <h1><i class="ti ti-books" aria-hidden="true"></i>Org Prompt Library <span class="count-badge" id="total-count"></span></h1>
      <div class="subtitle">Token-optimized, reusable prompts for SDLC, engineering roles, and Copilot</div>
    </div>
    <div class="search-wrap"><i class="ti ti-search" aria-hidden="true" style="color:var(--text-tertiary);font-size:16px"></i><input id="search" placeholder="Search prompts…" oninput="render()"></div>
  </div>
  <div class="role-tabs" id="role-tabs"></div>
  <div class="note-banner" id="note-banner"></div>
  <div class="prompt-grid" id="grid"></div>
  <div class="footer-note">Click any card to view, copy, or use the full prompt.</div>
</div>

<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="m-title"></div>
      <button class="modal-close" onclick="closeModal()" aria-label="Close">&times;</button>
    </div>
    <div class="modal-tags" id="m-tags"></div>
    <div class="prompt-box" id="m-body"></div>
    <div class="modal-actions">
      <button class="primary-btn" onclick="copyModal()"><i class="ti ti-copy"></i> Copy prompt</button>
    </div>
  </div>
</div>

<script>
const ROLES={
  "All":"ti-layout-grid",
  "Copilot":"ti-brand-github",
  "SDLC Phase":"ti-recycle",
  "Project Mode":"ti-refresh-alert",
  "Developer":"ti-code",
  "Tester":"ti-test-pipe",
  "Scrum Master":"ti-refresh",
  "Product Owner":"ti-target",
  "Architect":"ti-components",
  "DevOps":"ti-server",
  "Tech Lead":"ti-crown"
};

const COLORS={
  "Developer":"#185FA5","Tester":"#0F6E56","Scrum Master":"#533AB7",
  "Product Owner":"#D85A30","Architect":"#993556","DevOps":"#BA7517",
  "Tech Lead":"#639922","Project Mode":"#993556","SDLC Phase":"#185FA5","Copilot":"#0F6E56"
};
const BG={
  "Developer":"#E6F1FB","Tester":"#E1F5EE","Scrum Master":"#EEEDFE",
  "Product Owner":"#FAECE7","Architect":"#FBEAF0","DevOps":"#FAEEDA",
  "Tech Lead":"#EAF3DE","Project Mode":"#FBEAF0","SDLC Phase":"#E6F1FB","Copilot":"#E1F5EE"
};

const NOTES={
  "Copilot":"Designed for GitHub Copilot Chat (VS Code / JetBrains). Uses #file, #selection, #codebase, @workspace, and slash commands. Copy directly into Copilot Chat — context comes from the editor, not placeholders."
};

const PROMPTS=[
// ── COPILOT — 12 ──────────────────────────────────────────────────────
{role:"Copilot",isNew:true,title:"Review selection — diff-equivalent",tags:["review","#selection"],desc:"Review only the highlighted code, not the whole file — mirrors diff-only review for Copilot.",prompt:`Review #selection only.
Check for: bugs, null/edge cases, security issues, naming clarity, missing test coverage.
Label each finding: [critical] [warning] [suggestion]
Output: Finding → location → issue → one-line fix.
Do not comment on unchanged code outside the selection or restate the whole file.`},
{role:"Copilot",isNew:true,title:"Implement from spec — scoped file",tags:["implement","#file"],desc:"Implement a feature in a named file only, matching existing style from one reference file.",prompt:`Implement this in #file:<target-file>.
Spec: [2-3 sentence feature description]
Match the style/patterns used in #file:<reference-file>.
Constraints: no new dependencies unless I confirm. Don't touch other files.
Output code only, with inline comments for non-obvious logic.`},
{role:"Copilot",isNew:true,title:"/fix with root-cause explanation",tags:["debug","/fix"],desc:"Use Copilot's /fix on a selection but force a root-cause explanation before the patch.",prompt:`/fix #selection
Before patching: state the root cause in 1 sentence.
Then: the fix.
Then: one risk the fix could introduce.
Keep total response under 6 lines outside the code block.`},
{role:"Copilot",isNew:true,title:"/tests — edge-case focused",tags:["testing","/tests"],desc:"Generate unit tests for the selected function, explicitly prioritizing edge cases over happy path.",prompt:`/tests #selection
Prioritize: null/empty inputs, boundary values, type mismatches, error/exception paths.
Include happy path only once, briefly.
Use the testing framework already in this repo (infer from existing test files via #codebase if unsure).`},
{role:"Copilot",isNew:true,title:"@workspace — repo-wide impact check",tags:["impact","@workspace"],desc:"Check what else in the codebase touches a function/symbol before renaming or changing its signature.",prompt:`@workspace Find all usages of <function/symbol name>.
List: file + line + how it's used (call, import, override).
Flag any usage that would break if I change its signature to: [describe new signature].
Do not modify anything yet — impact list only.`},
{role:"Copilot",isNew:true,title:"/explain — onboarding to unfamiliar code",tags:["explain","/explain"],desc:"Explain a selected block of unfamiliar code in plain terms before modifying it.",prompt:`/explain #selection
Explain in plain language: what it does, why it likely exists, what would break if removed.
Flag anything that looks like a workaround or non-obvious dependency.
Keep it under 8 lines.`},
{role:"Copilot",isNew:true,title:"Commit message from staged changes",tags:["git","commit"],desc:"Generate a conventional commit message from the actual diff, not a guess.",prompt:`Using the current git diff (staged changes), write a conventional commit message.
Format: <type>(<scope>): <summary>
Body: 2-3 bullets max, only for non-obvious changes.
Do not invent changes not present in the diff.`},
{role:"Copilot",isNew:true,title:"PR description generator",tags:["git","pull-request"],desc:"Generate a PR description from the diff between current branch and main.",prompt:`@workspace Compare current branch against main.
Generate a PR description:
- Summary (2-3 sentences)
- Changes (bullet list, grouped by file/module)
- Testing done (infer from test file changes, else mark "manual verification needed")
- Risk/rollback note if changes touch shared/critical paths
Do not pad with generic boilerplate.`},
{role:"Copilot",isNew:true,title:"Inline doc generator — function scope",tags:["docs","#selection"],desc:"Generate docstring/JSDoc for the selected function only, matching repo convention.",prompt:`Add documentation to #selection only.
Match the doc style already used elsewhere in #codebase (JSDoc / docstring / etc — infer, don't ask).
Include: params, return, exceptions/errors, one usage example if non-trivial.
Do not add documentation to other functions in the file.`},
{role:"Copilot",isNew:true,title:"Security review — changed files only",tags:["security","@workspace"],desc:"Run a security pass limited to files changed in the current branch, not the full repo.",prompt:`@workspace List files changed in this branch vs main.
For each changed file: review for injection, broken auth, hardcoded secrets, unsafe deserialization, missing input validation.
Output: File → Issue → Severity → Fix.
Skip files with no changes. Skip generated/vendor files.`},
{role:"Copilot",isNew:true,title:"Custom instructions file — repo setup",tags:["setup","copilot-instructions"],desc:"Generate a .github/copilot-instructions.md so Copilot stops needing repeated context per session.",prompt:`@workspace Analyze this repo's structure, language, framework, and naming conventions.
Generate the content for .github/copilot-instructions.md covering:
- Project summary (2-3 sentences)
- Coding conventions to follow (naming, error handling, testing pattern)
- Things to avoid (deprecated patterns, files not to touch)
- Preferred libraries already in use — don't suggest alternatives
Output: file content only, ready to save.`},
{role:"Copilot",isNew:true,title:"Refactor with test safety net",tags:["refactor","/tests"],desc:"Refactor a selection only after confirming test coverage exists, generating tests first if missing.",prompt:`@workspace Check if #selection has existing test coverage.
If no coverage: /tests #selection first, output those tests.
Then refactor #selection for [readability/performance — specify].
Confirm: refactored version must pass the same tests unchanged.
Output: tests (if generated) + refactored code + 3-bullet change summary.`},

// ── SDLC PHASE — 12 ───────────────────────────────────────────────────
{role:"SDLC Phase",title:"Requirements elicitation",tags:["requirements","discovery"],desc:"Turn a raw business problem into structured requirements before design starts.",prompt:`BUSINESS PROBLEM: [describe in plain language]
STAKEHOLDERS: [who's involved]
KNOWN CONSTRAINTS: [budget, time, tech, compliance]

EXTRACT:
- Functional requirements (numbered)
- Non-functional requirements
- Assumptions
- Open questions to validate with stakeholders
OUTPUT: Structured list only. No solutioning yet.`},
{role:"SDLC Phase",title:"Feasibility & risk brief",tags:["feasibility","planning"],desc:"Assess technical/business feasibility before committing to a project.",prompt:`PROPOSED PROJECT: [1-2 sentence description]
REQUIREMENTS: [list key ones]
CONSTRAINTS: [team, budget, timeline, tech stack]

ASSESS:
- Technical feasibility [Confident/Probable/Speculative]
- Business feasibility
- Top 3 risks
- Effort signal: [S/M/L/XL]
VERDICT: Go / Go with conditions / No-go + reason.`},
{role:"SDLC Phase",title:"Estimation — story/effort sizing",tags:["estimation","planning"],desc:"Size a set of requirements into effort estimates without full design docs.",prompt:`REQUIREMENTS / STORIES: [list]
TEAM CONTEXT: [size, familiarity with domain/tech]
REFERENCE: [past similar work + actual effort, if known]

FOR EACH ITEM:
- Size: [S/M/L/XL or story points]
- Key uncertainty driving the estimate
- Dependency that could blow the estimate
OUTPUT: Table. Flag items needing spike/discovery before sizing.`},
{role:"SDLC Phase",title:"High-level design (HLD)",tags:["design","HLD"],desc:"Produce a high-level design from requirements before detailed design.",prompt:`REQUIREMENTS: [list functional + key NFRs]
EXISTING SYSTEM CONTEXT: [what it integrates with]
CONSTRAINTS: [tech stack, team skills]

PRODUCE HLD:
- Components and responsibilities
- Data flow (text description)
- Integration points
- Key design decisions + alternatives rejected
SKIP: implementation detail, code, low-level schema.`},
{role:"SDLC Phase",title:"Low-level design (LLD) from HLD",tags:["design","LLD"],desc:"Expand one HLD component into low-level design without re-deriving the whole system.",prompt:`HLD CONTEXT: [paste only the relevant component description]
COMPONENT TO DETAIL: [name]
INTERFACES IT MUST EXPOSE: [list]

PRODUCE LLD:
- Class/module breakdown
- Method signatures (no implementation)
- Data structures
- Error handling approach
SCOPE: This component only. Do not redesign other components.`},
{role:"SDLC Phase",title:"Build readiness checklist",tags:["build","gate"],desc:"Verify a story/feature is ready to start development — gate before build phase.",prompt:`STORY/FEATURE: [paste title + AC]
DESIGN ARTIFACT: [link or 1-line confirm exists]
DEPENDENCIES: [list]

CHECK:
- AC clear and testable? [yes/no + gap]
- Design approved? [yes/no]
- Dependencies resolved or mocked? [yes/no]
- Test data/environment ready? [yes/no]
VERDICT: Ready / Blocked — list blockers only.`},
{role:"SDLC Phase",title:"UAT scenario builder",tags:["UAT","acceptance"],desc:"Generate user acceptance test scenarios from acceptance criteria for business sign-off.",prompt:`FEATURE: [describe]
ACCEPTANCE CRITERIA: [paste]
BUSINESS USER PROFILE: [who will test — role, technical level]

GENERATE:
- UAT scenarios in plain business language (no technical jargon)
- Pass/fail criteria per scenario
- Sign-off checklist
SKIP: technical test cases, automation scripts.`},
{role:"SDLC Phase",title:"Go-live / release checklist",tags:["release","go-live"],desc:"Build a go-live checklist for a release without re-describing the whole project.",prompt:`RELEASE: [name/version]
SCOPE: [what's shipping]
ENVIRONMENTS: [staging → prod path]
ROLLBACK PLAN: [exists? describe or TBD]

CHECKLIST:
- Pre-release (tests passed, approvals, comms sent)
- Release steps (deploy order, feature flags, migrations)
- Post-release verification (smoke tests, monitoring)
- Rollback trigger conditions
OUTPUT: Checklist only, no narrative.`},
{role:"SDLC Phase",title:"Cutover plan — migration/release",tags:["cutover","migration"],desc:"Plan a cutover window for a major release or migration with minimal downtime.",prompt:`CUTOVER SCOPE: [what's switching — system, data, traffic]
DOWNTIME TOLERANCE: [acceptable window]
DEPENDENCIES: [systems/teams involved]
ROLLBACK WINDOW: [how long we can still revert]

PLAN:
- Sequence of steps with owner per step
- Go/no-go checkpoints
- Communication plan (who's notified, when)
- Rollback trigger + procedure
OUTPUT: Timeline table. No background context.`},
{role:"SDLC Phase",title:"Post-release health check",tags:["post-release","monitoring"],desc:"Assess a release's health in the first 24-72 hours using only delta signals.",prompt:`RELEASE: [name/version, deployed when]

{role:"Architect",title:"System design review — RFC",tags:["design","RFC"],desc:"Review a system design proposal and identify risks before implementation.",prompt:`DESIGN SUMMARY: [describe proposed system — components, data flow, tech choices]

let activeRole="All", currentPrompt=null;

function roleColor(r){return COLORS[r]||"#888"}
function roleBG(r){return BG[r]||"#f5f5f5"}

function initTabs(){
  const el=document.getElementById("role-tabs");
  Object.entries(ROLES).forEach(([r,icon])=>{
    const btn=document.createElement("button");
    btn.className="role-tab"+(r===activeRole?" active":"");
    btn.innerHTML=`<i class="ti ${icon}" aria-hidden="true" style="margin-right:4px;font-size:13px;vertical-align:-1px"></i>${r}`;
    btn.onclick=()=>{activeRole=r;document.querySelectorAll(".role-tab").forEach(b=>b.classList.remove("active"));btn.classList.add("active");render();};
    el.appendChild(btn);
  });
}

function render(){
  const q=(document.getElementById("search").value||"").toLowerCase();
  const filtered=PROMPTS.filter(p=>{
    const matchRole=activeRole==="All"||p.role===activeRole;
    const matchQ=!q||p.title.toLowerCase().includes(q)||p.desc.toLowerCase().includes(q)||(p.tags||[]).some(t=>t.toLowerCase().includes(q))||p.role.toLowerCase().includes(q);
    return matchRole&&matchQ;
  });
  document.getElementById("total-count").textContent=filtered.length;

  const banner=document.getElementById("note-banner");
  if(NOTES[activeRole]){banner.textContent=NOTES[activeRole];banner.classList.add("show");}
  else{banner.classList.remove("show");}

  const grid=document.getElementById("grid");
  if(!filtered.length){grid.innerHTML='<div class="empty"><i class="ti ti-mood-empty" style="font-size:32px;display:block;margin-bottom:8px"></i>No prompts match.</div>';return;}
  grid.innerHTML=filtered.map(p=>{
    const idx=PROMPTS.indexOf(p);
    return`<div class="prompt-card${p.isNew?' highlight':''}" onclick="openModal(${idx})">
      <div class="card-header">
        <div class="card-icon" style="background:${roleBG(p.role)};color:${roleColor(p.role)}"><i class="ti ${ROLES[p.role]||'ti-file'}" aria-hidden="true"></i></div>
        <div class="card-meta">
          <div class="card-title">${p.title}</div>
          <div class="card-role">${p.role}</div>
        </div>
      </div>
      <div class="card-desc">${p.desc}</div>
      <div class="card-footer">
        <div style="display:flex;gap:4px;flex-wrap:wrap">${(p.tags||[]).map(t=>`<span class="tag">${t}</span>`).join("")}</div>
        <button class="copy-btn" id="cpbtn-${idx}" onclick="event.stopPropagation();copyCard(${idx})"><i class="ti ti-copy" aria-hidden="true"></i> Copy</button>
      </div>
    </div>`;
  }).join("");
}

function openModal(idx){
  currentPrompt=idx;
  const p=PROMPTS[idx];
  document.getElementById("m-title").textContent=p.title;
  document.getElementById("m-body").textContent=p.prompt;
  document.getElementById("m-tags").innerHTML=`<span class="tag" style="background:${roleBG(p.role)};color:${roleColor(p.role)};border-color:${roleColor(p.role)}44">${p.role}</span>`+(p.tags||[]).map(t=>`<span class="tag">${t}</span>`).join("");
  document.getElementById("modal-bg").classList.add("open");
}
function closeModal(){document.getElementById("modal-bg").classList.remove("open");currentPrompt=null;}
function copyText(text,btn){
  function done(){
    if(btn){const orig=btn.innerHTML;btn.innerHTML='<i class="ti ti-check"></i> Copied';btn.classList.add("copied");setTimeout(()=>{btn.innerHTML=orig;btn.classList.remove("copied");},1500);}
  }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done));
  } else {
    fallbackCopy(text,done);
  }
}
function fallbackCopy(text,cb){
  const ta=document.createElement("textarea");
  ta.value=text;ta.style.position="fixed";ta.style.left="-9999px";
  document.body.appendChild(ta);ta.select();
  try{document.execCommand("copy");}catch(e){}
  document.body.removeChild(ta);
  if(cb)cb();
}
function copyCard(idx){copyText(PROMPTS[idx].prompt, document.getElementById("cpbtn-"+idx));}
function copyModal(){
  if(currentPrompt===null)return;
  copyText(PROMPTS[currentPrompt].prompt, document.querySelector(".modal-actions .primary-btn"));
}

document.addEventListener("keydown",(e)=>{if(e.key==="Escape")closeModal();});

initTabs();render();
</script>
